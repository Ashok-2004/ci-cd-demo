# Listen for HTTP traffic on port 80 inside the frontend container.
server {
  listen 80;

  # Serve static React build files from this folder.
  root /usr/share/nginx/html;

  # Use index.html as the default page.
  index index.html;

  # Return React's index.html for unknown paths so client-side routing can work later.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
